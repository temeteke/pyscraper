name: Publish Docker image

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  schedule:
    - cron: '55 13 * * tue'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub and GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to Docker Hub
        uses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: version
        run: |
          TAG="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo '0.0')"
          MAJOR_MINOR="$(echo "$TAG" | grep -oE '^[0-9]+\.[0-9]+' || true)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "major_minor=$MAJOR_MINOR" >> $GITHUB_OUTPUT

      - name: Compute date
        id: date
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@ad44023a93711e3deb337508980b4b5e9bcdc5dc
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            temeteke/pyscraper:latest
            temeteke/pyscraper:${{ steps.version.outputs.tag }}
            temeteke/pyscraper:${{ steps.version.outputs.tag }}-${{ steps.date.outputs.date }}
            temeteke/pyscraper:${{ steps.version.outputs.major_minor }}
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}-${{ steps.date.outputs.date }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.major_minor }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
          build-args: |
            VERSION=${{ steps.version.outputs.tag }}

      - name: Build and push Docker image standalone
        uses: docker/build-push-action@ad44023a93711e3deb337508980b4b5e9bcdc5dc
        with:
          context: .
          file: ./Dockerfile.standalone
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            temeteke/pyscraper-standalone:latest
            temeteke/pyscraper-standalone:${{ steps.version.outputs.tag }}
            temeteke/pyscraper-standalone:${{ steps.version.outputs.tag }}-${{ steps.date.outputs.date }}
            temeteke/pyscraper-standalone:${{ steps.version.outputs.major_minor }}
            ghcr.io/${{ github.repository }}-standalone:latest
            ghcr.io/${{ github.repository }}-standalone:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository }}-standalone:${{ steps.version.outputs.tag }}-${{ steps.date.outputs.date }}
            ghcr.io/${{ github.repository }}-standalone:${{ steps.version.outputs.major_minor }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
          build-args: |
            VERSION=${{ steps.version.outputs.tag }}
